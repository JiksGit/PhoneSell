apiVersion: apps/v1
kind: Deployment
metadata:
  name: sungji-backend
  namespace: sungji-phone
  labels:
    app: sungji-phone
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sungji-phone
      component: backend
  template:
    metadata:
      labels:
        app: sungji-phone
        component: backend
    spec:
      containers:
        - name: sungji-backend
          image: sungji-backend:latest   # 로컬 빌드 이미지: docker build -t sungji-backend:latest ./backend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-configmap
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: db-password
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: jwt-secret
          volumeMounts:
            - name: firebase-secret
              mountPath: /app/firebase-service-account.json
              subPath: firebase-service-account.json
              readOnly: true
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: firebase-secret
          secret:
            secretName: firebase-secret
