apiVersion: v1
kind: Secret
metadata:
  name: firebase-secret
  namespace: sungji-phone
  labels:
    app: sungji-phone
    component: backend
type: Opaque
data:
  # Firebase 서비스 계정 JSON을 base64로 인코딩하여 아래에 붙여넣기
  # 인코딩 방법:
  #   Linux/Mac: base64 -w 0 firebase-service-account.json
  #   Windows  : [Convert]::ToBase64String([IO.File]::ReadAllBytes("firebase-service-account.json"))
  firebase-service-account.json: CHANGE_ME_BASE64_ENCODED_FIREBASE_SERVICE_ACCOUNT_JSON

  # 또는 kubectl을 이용해 직접 생성 (권장):
  #   kubectl create secret generic firebase-secret \
  #     --from-file=firebase-service-account.json=./firebase-service-account.json \
  #     -n sungji-phone
