spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sungji_phone?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:sungji}
    password: ${SPRING_DATASOURCE_PASSWORD:sungjipassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 100

  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: sungji-phone

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

app:
  crawler:
    schedule-delay-ms: 1800000   # 30분
    ppomppu-url: "https://www.ppomppu.co.kr/zboard/zboard.php?id=ppomppu2"
  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:./firebase-service-account.json}
  security:
    prometheus-allowed-cidr: ${PROMETHEUS_ALLOWED_IP:172.16.0.0/12}
  jwt:
    secret: ${JWT_SECRET:sungji-phone-secret-key-must-be-at-least-32-chars-long}
    expiration-ms: 86400000  # 24시간

logging:
  level:
    com.sungji: DEBUG
    org.springframework.web: INFO
